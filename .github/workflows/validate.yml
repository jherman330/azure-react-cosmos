# Run same validations as pre-commit hook so bypassed commits are still caught before merge.
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/web

      - name: Build backend
        run: dotnet build
        working-directory: src/api

      - name: Run FastLocal backend tests
        run: bash scripts/run-fastlocal-tests.sh

      - name: Run frontend checks (typecheck + ESLint)
        run: bash scripts/run-frontend-checks.sh
